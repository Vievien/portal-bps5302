<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Admin</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">

    <div class="container-fluid">

        <span class="navbar-brand">
            DASHBOARD ADMIN
        </span>

        <a href="/logout"
           class="text-white">

            Logout

        </a>

    </div>

</nav>

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-body">
            
            <a href="/tambah_user"
               class="btn btn-success mb-3">

               Tambah User
            
            </a>

            

            <a href="/export_excel"
               class="btn btn-primary mb-3">

               Export Excel

            </a>

            </a>

            <table class="table table-bordered table-hover">

                <thead class="table-dark">

                    <tr>

                        <th>Bidang</th>

                        <th>Judul</th>

                        <th>Link</th>

                    </tr>

                </thead>

                <tbody>

                    {% for item in data_link %}

                    <tr>

                        <td>{{ item.bidang }}</td>

                        <td>{{ item.judul }}</td>

                        <td>

                            <a href="{{ item.link }}"
                               target="_blank"
                               class="btn btn-primary btn-sm">

                               Buka

                            </a>

                        </td>

                    </tr>

                    {% endfor %}

                </tbody>

            </table>
            <br><br>

            <h3>Daftar User</h3>

            <table class="table table-bordered table-hover">

                <thead class="table-dark">

                    <tr>

                        <th>Username</th>

                        <th>Password</th>

                        <th>Role</th>
                        <th>Aksi</th>

                    </tr>

                </thead>

                <tbody>

                    {% for user in data_user %}

                    <tr>

                        <td>{{ user.username }}</td>

                        <td>{{ user.password }}</td>

                        <td>{{ user.role }}</td>

<td>

    <a href="/edit_user/{{ user.id }}"
       class="btn btn-warning btn-sm">

       Edit

    </a>

    

    <a href="/hapus_user/{{ user.id }}"
       class="btn btn-danger btn-sm"
       onclick="return confirm('Yakin ingin menghapus user?')">

       Hapus

    </a>

    

</td>

                    </tr>

                    {% endfor %}

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
