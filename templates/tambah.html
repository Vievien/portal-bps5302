<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Tambah Link</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow">

                <div class="card-body">

                    <h3 class="mb-4">
                        Tambah Link
                    </h3>

                    <form method="POST">

                        <div class="mb-3">

                            <label class="form-label">
                                Bidang
                            </label>

                            <select name="bidang"
                                    class="form-select">

                                <option>Umum</option>
                                <option>Nerwilis</option>
                                <option>Produksi</option>
                                <option>Distribusi</option>
                                <option>Sosial</option>
                                <option>IPDS</option>

                            </select>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Judul
                            </label>

                            <input type="text"
                                   name="judul"
                                   class="form-control">

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Link
                            </label>

                            <input type="text"
                                   name="link"
                                   class="form-control">

                        </div>

                        <button type="submit"
                                class="btn btn-success">

                            Simpan

                        </button>

                        <a href="/dashboard"
                           class="btn btn-secondary">

                            Kembali

                        </a>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
