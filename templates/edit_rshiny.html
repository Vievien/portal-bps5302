<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Edit R Shiny</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm px-3">

    <a class="navbar-brand fw-bold" href="/dashboard">
        📊 PORTAL 5302
    </a>

    <div class="ms-auto">

        <a class="btn btn-outline-light me-2"
           href="/dashboard">

           Dashboard

        </a>

        <a class="btn btn-outline-light me-2"
           href="/rshiny">

           Dashboard R Shiny

        </a>

        <a class="btn btn-danger"
           href="/logout">

           Logout

        </a>

    </div>

</nav>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow">

                <div class="card-body">

                    <h3 class="mb-4">
                        Edit Link R Shiny
                    </h3>

                    <form method="POST">

                        <div class="mb-3">

                            <label class="form-label">
                                Method
                            </label>

                            <input type="text"
                                   name="method"
                                   class="form-control"
                                   value="{{ data.method }}">

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Link Webapp
                            </label>

                            <input type="text"
                                   name="webapp"
                                   class="form-control"
                                   value="{{ data.webapp }}">

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Link Journal
                            </label>

                            <input type="text"
                                   name="journal"
                                   class="form-control"
                                   value="{{ data.journal }}">

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Keterangan
                            </label>

                            <textarea name="keterangan"
                                      class="form-control">{{ data.keterangan }}</textarea>

                        </div>

                        <button type="submit"
                                class="btn btn-warning">

                            Update

                        </button>

                        <a href="/rshiny"
                           class="btn btn-secondary">

                           Kembali

                        </a>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
