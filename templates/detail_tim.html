<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>{{ kategori.nama_tim }}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container py-5">

    <div class="d-flex justify-content-between align-items-center mb-4">

    <h1>{{ kategori.nama_tim }}</h1>

    <div>

        <a href="/tim"
           class="btn btn-secondary">

           Menu TIM

        </a>

        <a href="/dashboard"
           class="btn btn-dark">

           Dashboard

        </a>

    </div>

</div>

    <div class="row g-4">

        {% for item in data_menu %}

        <div class="col-md-3">

            <div class="card shadow h-100">

                <div class="card-body text-center">

                    <h5 class="mb-3">
                        {{ item.judul }}
                    </h5>

                    <a href="/menu_tim/{{ item.id }}"
                       class="btn btn-primary">

                        Buka

                    </a>

{% if session['role'] == 'admin' %}

<div class="mt-2">

<a href="/hapus_menu_tim/{{ item.id }}"
   class="btn btn-danger btn-sm"
   onclick="return confirm('Hapus menu?')">

   Hapus

</a>

</div>

{% endif %}

                </div>

            </div>

        </div>

        {% endfor %}

    </div>

</div>

</body>
</html>
