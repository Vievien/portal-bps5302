<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Tambah Menu Tim</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow">

                <div class="card-body">

                    <h3 class="mb-4">
                        Tambah Menu Tim
                    </h3>

                    <form method="POST">

                        <!-- KATEGORI -->
                        <div class="mb-3">

                            <label class="form-label">
                                Kategori
                            </label>

                            <input type="text"
       name="kategori"
       class="form-control"
       placeholder="Masukkan Nama Tim">

                        </div>

                        <!-- JUDUL -->
                        <div class="mb-3">

                            <label class="form-label">
                                Judul
                            </label>

                            <input type="text"
                                   name="judul"
                                   class="form-control">

                        </div>

                        <!-- LINK -->
                        <div class="mb-3">

                            <label class="form-label">
                                Link
                            </label>

                            <input type="text"
                                   name="link"
                                   class="form-control">

                        </div>

                        <!-- TIPE -->
<div class="mb-3">

    <label class="form-label">
        Tipe
    </label>

    <select name="tipe"
            class="form-select">

        <option value="iframe">
            Iframe
        </option>

        <option value="link">
            Link Biasa
        </option>

    </select>

</div>

                        <!-- BUTTON -->
                        <button type="submit"
                                class="btn btn-success">

                            Simpan

                        </button>

                        <a href="/tim"
                           class="btn btn-secondary">

                            Kembali

                        </a>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
