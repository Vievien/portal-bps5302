<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>TIM</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

</head>

<body class="bg-light">

<div class="container py-5">

<div class="d-flex justify-content-between align-items-center mb-4">

    <h1>TIM</h1>

    <div>

        {% if session['role'] == 'admin' %}

        <a href="/admin"
           class="btn btn-secondary">

           Dashboard

        </a>

        {% else %}

        <a href="/dashboard"
           class="btn btn-secondary">

           Dashboard

        </a>

        {% endif %}

        <a href="/tambah_menu_tim"
           class="btn btn-success">

           Tambah Menu Tim

        </a>

    </div>

</div>

<form method="GET"
      class="mb-4">

<input type="text"
       name="cari"
       class="form-control"
       placeholder="Cari nama tim...">

</form>

<div class="row g-4">

{% for item in data_tim %}

<div class="col-md-3">

<div class="card shadow h-100">

<div class="card-body text-center">

<h5 class="mb-3">

{{ item.nama_tim }}

</h5>

<a href="/tim/{{ item.id }}"
   class="btn btn-primary">

   Buka

</a>

{% if session['role'] == 'admin' %}

<div class="mt-2">

<a href="/hapus_tim/{{ item.id }}"
   class="btn btn-danger btn-sm"
   onclick="return confirm('Hapus tim?')">

   Hapus

</a>

</div>

{% endif %}

</div>

</div>

</div>

{% endfor %}

</div>

</div>

</body>
</html>
