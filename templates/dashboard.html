<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Dashboard Pegawai</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container-fluid">

    <div class="row">

        <!-- SIDEBAR -->
        <div class="col-md-2 bg-dark text-white min-vh-100 p-3">

            <h4>WEB LINK</h4>

            <hr>

            <p>
                {{ username }}
            </p>

            <a href="/dashboard"
               class="btn btn-outline-light w-100 mb-2">

               Dashboard

            </a>

            <a href="/tambah"
               class="btn btn-outline-light w-100 mb-2">

               Tambah Link

            </a>
            
            

            <a href="/logout"
               class="btn btn-danger w-100">

               Logout

            </a>

        </div>

        <!-- CONTENT -->
        <div class="col-md-10 p-4">

            <h2 class="mb-4">
                Dashboard Pegawai
            </h2>

            <!-- CARD STATISTIK -->
            <div class="row mb-4">

                <div class="col-md-4">

                    <div class="card text-bg-primary shadow">

                        <div class="card-body">

                            <h5>Total Link</h5>

                            <h2>{{ total_link }}</h2>

                        </div>

                    </div>

                </div>

                <div class="col-md-4">

                    <div class="card text-bg-success shadow">

                        <div class="card-body">

                            <h5>Total User</h5>

                            <h2>{{ total_user }}</h2>

                        </div>

                    </div>

                </div>

                <div class="col-md-4">

                    <div class="card text-bg-dark shadow">

                        <div class="card-body">

                            <h5>Total Bidang</h5>

                            <h2>{{ total_bidang }}</h2>

                        </div>

                    </div>

                </div>

            </div>

            <!-- SEARCH -->
            <div class="card shadow mb-4">

                <div class="card-body">

                    <form method="GET">

                        <div class="row">

                            <div class="col-md-5">

                                <input type="text"
                                       name="cari"
                                       class="form-control"
                                       placeholder="Cari judul link...">

                            </div>

                            <div class="col-md-4">

                                <select name="bidang"
                                        class="form-select">

                                    <option>Semua</option>

                                    <option>Umum</option>
                                    <option>Nerwilis</option>
                                    <option>Produksi</option>
                                    <option>Distribusi</option>
                                    <option>Sosial</option>
                                    <option>IPDS</option>

                                </select>

                            </div>

                            <div class="col-md-3">

                                <button type="submit"
                                        class="btn btn-primary w-100">

                                    Cari

                                </button>

                            </div>

                        </div>

                    </form>

                </div>

            </div>

            <!-- TABEL -->
            <div class="card shadow">

                <div class="card-body">

                    <table class="table table-bordered table-hover">

                        <thead class="table-primary">

                            <tr>

                                <th>Bidang</th>

                                <th>Judul</th>

                                <th>Link</th>

                                <th>Aksi</th>

                            </tr>

                        </thead>

                        <tbody>

                            {% for item in data_link %}

                            <tr>

                                <td>{{ item.bidang }}</td>

                                <td>{{ item.judul }}</td>

                                <td>

                                    <a href="{{ item.link }}"
                                       target="_blank"
                                       class="btn btn-primary btn-sm">

                                       Buka

                                    </a>

                                </td>

                                <td>

                                    <a href="/edit/{{ item.id }}"
                                       class="btn btn-warning btn-sm">

                                       Edit

                                    </a>

                                    <a href="/hapus/{{ item.id }}"
                                       class="btn btn-danger btn-sm"
                                       onclick="return confirm('Yakin ingin menghapus?')">

                                       Hapus

                                    </a>

                                </td>

                            </tr>

                            {% endfor %}

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
