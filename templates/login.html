<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login SHINY</title>

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body {

            margin: 0;
            padding: 0;

            height: 100vh;

            background-image: url("{{ url_for('static', filename='bg.jpg') }}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            display: flex;
            justify-content: center;
            align-items: center;

            font-family: Arial, sans-serif;

        }

        .overlay {

            position: fixed;

            top: 0;
            left: 0;

            width: 100%;
            height: 100%;

            background: rgba(0,0,0,0.45);

            z-index: 1;

        }

        .login-container {

            position: relative;
            z-index: 2;

            width: 100%;
            max-width: 450px;

        }

        .card {

            border: none;

            border-radius: 20px;

            background: rgba(255,255,255,0.15);

            backdrop-filter: blur(10px);

            box-shadow: 0 8px 32px rgba(0,0,0,0.3);

            color: white;

        }

        .form-control {

            background: rgba(255,255,255,0.2);

            border: none;

            color: white;

        }

        .form-control:focus {

            background: rgba(255,255,255,0.3);

            color: white;

            box-shadow: none;

        }

        .form-label {

            color: white;

        }

        .text-muted {

            color: #e0e0e0 !important;

        }

        .btn-primary {

            border-radius: 10px;

            font-weight: bold;

        }

    </style>

</head>

<body>

<div class="overlay"></div>

<div class="container login-container">

    <div class="row justify-content-center">

        <div class="col-md-12">

            <div class="card shadow">

                <div class="card-body p-4">

                    <div class="text-center mb-4">

                        <img src="{{ url_for('static', filename='bps.png') }}"
                             width="100">

                        <h3 class="mt-3">
                            LOGIN SHINY
                        </h3>

                        <p class="text-muted mb-0">
                            Badan Pusat Statistik
                        </p>

                        <p class="text-muted">
                            Kabupaten Sumba Timur
                        </p>

                    </div>

                    <form method="POST">

                        <div class="mb-3">

                            <label class="form-label">
                                Username
                            </label>

                            <input type="text"
                                   name="username"
                                   class="form-control">

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Password
                            </label>

                            <input type="password"
                                   name="password"
                                   class="form-control">

                        </div>

                        <button type="submit"
                                class="btn btn-primary w-100">

                            Login

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
